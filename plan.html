<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi plan | ALZA</title>
    <link rel="icon" href="./public/favicon.ico" sizes="any" />
    <link rel="icon" href="./public/assets/alza-mark.png" type="image/png" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body class="plan-page">
    <main class="plan-shell manage-plan-shell">
      <header class="plan-heading">
        <img src="./public/assets/alza-logo-full.png" alt="ALZA" />
        <p class="eyebrow">Gestionar plan</p>
        <h1>Mi plan</h1>
        <p>Consultá el estado de tu acceso, el tiempo restante y cancelá tu plan si lo necesitás.</p>
      </header>

      <section class="subscription-panel" data-plan-panel>
        <p class="mock-toast" data-plan-status>Cargando tu plan...</p>
      </section>

      <footer class="plan-footer">
        <a class="text-button" href="./platform.html">Volver al dashboard</a>
        <a class="text-button" href="./index.html" data-sign-out>Salir</a>
      </footer>
    </main>

    <script src="./src/config.js"></script>
    <script type="module" src="./src/plan.js"></script>
    <script type="module" src="./src/session.js"></script>
  </body>
</html>
